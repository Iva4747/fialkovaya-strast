<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — Фиалковая страсть</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #9b8ec4;
            --primary-soft: #9b8ec4;
            --bg: #f8f5ff;
            --white: #ffffff;
            --text: #2d2a26;
            --text-light: #6b6560;
            --border: #e8e3dd;
            --radius: 16px;
            --transition: 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        h1, h2, h3, .logo {
            font-family: 'Playfair Display', Georgia, serif;
            font-weight: 600;
        }

        .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }

        header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            max-width: 1140px;
            margin: 0 auto;
        }
        .logo {
            font-size: 1.6rem;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.5px;
        }
        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.95rem;
            transition: color var(--transition);
        }
        .nav-links a:hover, .nav-links a.active { color: var(--primary); }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            color: var(--text);
        }

        .page-header {
            text-align: center;
            margin: 40px 0 20px;
        }
        .page-header h1 {
            font-size: 2.4rem;
            color: #4a3b5c;
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 0;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border);
        }
        .tab-btn {
            padding: 14px 36px;
            border: none;
            background: transparent;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.2rem;
            color: var(--text-light);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all var(--transition);
            font-weight: 500;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .tab-btn:hover { color: var(--primary); }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            align-items: center;
            justify-content: center;
        }
        .search-box {
            flex: 1;
            min-width: 260px;
            max-width: 400px;
            position: relative;
        }
        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            border: 1px solid var(--border);
            border-radius: 30px;
            font-family: inherit;
            font-size: 0.95rem;
            background: var(--white);
            transition: border var(--transition);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary-soft);
            box-shadow: 0 0 0 3px rgba(169,156,199,0.15);
        }
        .search-box .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #bbb;
            font-size: 1rem;
        }
        .counter {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-left: auto;
            white-space: nowrap;
        }
        .hidden { display: none !important; }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .card {
            background: var(--white);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.06);
            border-color: var(--primary-soft);
        }
        .card-img {
            height: 250px;
            overflow: hidden;
            flex-shrink: 0;
        }
        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .card:hover .card-img img { transform: scale(1.05); }
        .card-body {
            padding: 16px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card-body h3 {
            font-size: 1rem;
            color: #4a3b5c;
            margin-bottom: 4px;
        }
        .card-body .price {
            margin-top: auto;
            font-weight: 600;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }
        .pagination button {
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            background: var(--white);
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--text);
            transition: all var(--transition);
        }
        .pagination button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .pagination button:hover:not(.active) {
            border-color: var(--primary-soft);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 200;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--white);
            border-radius: var(--radius);
            max-width: 550px;
            width: 100%;
            padding: 32px;
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .modal-img {
            width: 100%;
            height: 300px;
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .modal-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .modal h2 {
            font-size: 1.6rem;
            color: #4a3b5c;
            margin-bottom: 10px;
        }
        .modal .price {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }
        .modal .desc {
            color: var(--text-light);
            margin-top: 10px;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            padding: 30px;
            color: #aaa;
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 65px;
                left: 0;
                right: 0;
                background: var(--white);
                padding: 20px 24px;
                border-bottom: 1px solid var(--border);
            }
            .nav-links.open { display: flex; }
            .controls { flex-direction: column; align-items: stretch; }
            .search-box { max-width: 100%; }
            .counter { margin-left: 0; text-align: center; }
            .tab-btn { padding: 12px 20px; font-size: 1.1rem; }
            .card-img { height: 200px; }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">🌸 Фиалковая страсть</a>
            <button class="menu-toggle" id="menuToggle">☰</button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Главная</a></li>
                <li><a href="catalog.html" class="active">Каталог</a></li>
                <li><a href="articles.html">Статьи</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="page-header">
            <h1>Каталог</h1>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="violets">🍃 Минифиалки</button>
            <button class="tab-btn" data-tab="kids"> 🪴 Детки и стартеры</button>
        </div>

        <div class="controls" id="violetControls">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchViolets" placeholder="Поиск по названию сорта...">
            </div>
            <span class="counter" id="violetCounter"></span>
        </div>

        <div class="controls hidden" id="kidsControls">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" id="searchKids" placeholder="Поиск по названию...">
            </div>
            <span class="counter" id="kidsCounter"></span>
        </div>

        <div class="cards-grid" id="cardsGrid"></div>
        <div class="pagination" id="pagination"></div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-img">
                <img src="" alt="" id="modalImg">
            </div>
            <h2 id="modalName"></h2>
            <p class="price" id="modalPrice"></p>
            <p class="desc" id="modalDesc"></p>
        </div>
    </div>

    <footer>
        <p>© 2026 Фиалковая страсть — коллекция Натальи Тыриной</p>
    </footer>

    <script src="data.js"></script>
    <script>
        const ITEMS_PER_PAGE = 24;
        let currentTab = 'violets';
        let currentPage = 1;
        let searchViolets = '';
        let searchKids = '';

        const grid = document.getElementById('cardsGrid');
        const pagination = document.getElementById('pagination');
        const violetControls = document.getElementById('violetControls');
        const kidsControls = document.getElementById('kidsControls');
        const searchVioletsInput = document.getElementById('searchViolets');
        const searchKidsInput = document.getElementById('searchKids');
        const violetCounter = document.getElementById('violetCounter');
        const kidsCounter = document.getElementById('kidsCounter');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');

        function getCurrentData() {
            return currentTab === 'violets' ? violetDataMini : kidsData;
        }

        function getFilteredData() {
            let data = [...getCurrentData()];

            if (currentTab === 'violets' && searchViolets.trim()) {
                const q = searchViolets.trim().toLowerCase();
                data = data.filter(v => v.name.toLowerCase().includes(q));
            } else if (currentTab === 'kids' && searchKids.trim()) {
                const q = searchKids.trim().toLowerCase();
                data = data.filter(v => v.name.toLowerCase().includes(q));
            }

            return data;
        }

        function render() {
            const filtered = getFilteredData();
            const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE) || 1;
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageItems = filtered.slice(start, start + ITEMS_PER_PAGE);

            if (currentTab === 'violets') {
                grid.innerHTML = pageItems.map(v => `
                    <div class="card" data-type="violet" data-id="${v.id}" onclick="openModal('violet', ${v.id})">
                        <div class="card-img">
                            <img src="${v.image || ''}" alt="${v.name}" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;color:#b8a9d0;background:#f0ecf5>🌸</div>'">
                        </div>
                        <div class="card-body">
                            <h3>${v.name}</h3>
                            <p class="price">${v.price ? v.price + ' ₽' : 'Цена по запросу'}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                grid.innerHTML = `
                    <div style="grid-column: 1 / -1; background: var(--white); border-radius: var(--radius); padding: 24px 28px; border: 1px solid var(--border);">
                        <p style="margin-bottom: 12px; color: var(--text-light); font-size: 0.95rem;">
                            <strong>Детки и стартеры в наличии</strong><br>
                            <span style="font-size: 0.85rem;">Цена от 250 до 350 ₽, зависит от сорта и размера.</span>
                        </p>
                        <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px 20px;">
                            ${pageItems.map(v => `<span style="font-size: 0.9rem; color: var(--text);">🌸 ${v.name}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            if (currentTab === 'violets') {
                violetCounter.textContent = `Найдено: ${filtered.length} сортов`;
            } else {
                kidsCounter.textContent = `В наличии: ${filtered.length} сортов`;
            }

            pagination.innerHTML = '';
            if (totalPages > 1) {
                for (let i = 1; i <= totalPages; i++) {
                    const btn = document.createElement('button');
                    btn.textContent = i;
                    if (i === currentPage) btn.classList.add('active');
                    btn.addEventListener('click', () => {
                        currentPage = i;
                        render();
                        window.scrollTo({ top: 300, behavior: 'smooth' });
                    });
                    pagination.appendChild(btn);
                }
            }
        }

        function openModal(type, id) {
            if (type !== 'violet') return;
            const item = violetDataMini.find(v => v.id === id);
            if (!item) return;

            document.getElementById('modalImg').src = item.image || '';
            document.getElementById('modalName').textContent = item.name;
            document.getElementById('modalPrice').textContent = item.price ? item.price + ' ₽' : 'Цена по запросу';
            document.getElementById('modalDesc').textContent = item.description || '';

            modalOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        function switchTab(tab) {
            currentTab = tab;
            currentPage = 1;

            tabBtns.forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-tab="${tab}"]`).classList.add('active');

            if (tab === 'violets') {
                violetControls.classList.remove('hidden');
                kidsControls.classList.add('hidden');
            } else {
                kidsControls.classList.remove('hidden');
                violetControls.classList.add('hidden');
            }
            render();
        }

        tabBtns.forEach(btn => {
            btn.addEventListener('click', () => switchTab(btn.dataset.tab));
        });

        searchVioletsInput.addEventListener('input', function() {
            searchViolets = this.value;
            currentPage = 1;
            render();
        });

        searchKidsInput.addEventListener('input', function() {
            searchKids = this.value;
            currentPage = 1;
            render();
        });

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', function(e) {
            if (e.target === modalOverlay) closeModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeModal();
        });

        document.getElementById('menuToggle').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('open');
        });

        render();
    </script>
</body>
</html>
